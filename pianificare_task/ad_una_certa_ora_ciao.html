<script>

function saluta() {
  console.log("Ciao");
}

function pianificaSaluto(oraDesiderata, minutiDesiderati, secondiDesiderati) {
  const intervalID = setInterval(function() {
    const adesso = new Date();
    const oraAttuale = adesso.getHours();
    const minutiAttuali = adesso.getMinutes();
    const secondiAttuali = adesso.getSeconds();

    if (
      oraAttuale === oraDesiderata &&
      minutiAttuali === minutiDesiderati &&
      secondiAttuali === secondiDesiderati
    ) {
      saluta();
      clearInterval(intervalID); // Interrompe l'intervallo dopo il saluto
    }
  }, 1000); // Controlla ogni secondo (1000 millisecondi)
}

// Esempio di utilizzo
const oraDesiderata = 15; // Ore in formato 24 ore (ad esempio, 18 rappresenta le 6 di sera)
const minutiDesiderati = 19;
const secondiDesiderati = 45;

window.onload = function() {

    pianificaSaluto(oraDesiderata, minutiDesiderati, secondiDesiderati);
};


</script>
