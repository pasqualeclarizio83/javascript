<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestire Paragrafo. Come? </title>
</head>
<body>
    <!-- Un elemento <p> con un identificativo (id) -->
        <p id="myParagraph">Questo è un paragrafo vuoto.</p>
</body>
</html>

<script>

// Ottieni l'elemento <p> utilizzando l'identificativo (id)
    var myParagraph = document.getElementById("myParagraph");

// Assegna un nuovo testo all'elemento <p>
myParagraph.textContent = "Sono Pasquale Clarizio";

// Puoi anche utilizzare innerHTML per assegnare HTML
// myParagraph.innerHTML = "Nuovo testo con <strong>HTML</strong>";

</script>
