<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page with Script in Head</title>

    <!-- Esempio di script nell'intestazione -->
    <script>
        // Questo è un semplice script JavaScript incorporato
        function showMessage() {
            alert('Hello, this is a message from a script in the head!');
        }
    </script>
</head>
<body>

    <!-- Contenuto del corpo della pagina -->
    <h1>Page Content</h1>
    <button onclick="showMessage()">Click me</button>

</body>
</html>
