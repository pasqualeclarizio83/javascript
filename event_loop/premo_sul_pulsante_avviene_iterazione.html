<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Assicurati che ci sia un elemento con id "mioPulsante" -->
    <button id="mioPulsante">Clicca</button>

    <!-- Il tuo script JavaScript -->
    <script>
        var mioPulsante = document.getElementById('mioPulsante');

        mioPulsante.addEventListener('click', function() {
            for (var i = 0; i < 3; i++) {
                console.log('Iterazione:', i);
            }
        });
    </script>
</body>
</html>
